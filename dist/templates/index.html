<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<title>EUR Converter</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header text-center">
<h4>EUR / IRR Converter</h4>
</div>

<div class="card-body">

<form method="POST">

<!-- mode -->
<div class="mb-3">

<label>
<input type="radio" name="mode" value="shamsi" checked>
شمسی (ریال → یورو)
</label>

&nbsp;&nbsp;

<label>
<input type="radio" name="mode" value="miladi">
میلادی (یورو → ریال)
</label>

</div>

<!-- date -->
<div class="mb-3">
<select name="date" class="form-select" required>

    {% for d in dates %}
        <option value="{{ d }}">{{ d }}</option>
    {% endfor %}

</select>

</div>

<!-- amount -->
<div class="mb-3">
<input type="number" name="amount" class="form-control" placeholder="مبلغ">
</div>

<button class="btn btn-primary w-100">
محاسبه
</button>

</form>

<hr>
{% if error %}

<div class="alert alert-danger mt-3 text-center">
    {{ error }}
</div>

{% endif %}


{% if rate %}

<div class="alert alert-info">
نرخ: {{ rate }}
</div>

<div class="alert alert-success">
نتیجه: {{ result }}
</div>

{% endif %}



</div>

</div>

</div>
<script>

function updateDates() {

    let mode =
        document.querySelector('input[name="mode"]:checked').value;

    fetch(`/dates?mode=${mode}`)
        .then(res => res.json())
        .then(data => {

            let select = document.querySelector("select[name='date']");
            select.innerHTML = "";

            data.forEach(d => {
                let opt = document.createElement("option");
                opt.value = d;
                opt.innerText = d;
                select.appendChild(opt);
            });

        });

}

document.querySelectorAll("input[name='mode']").forEach(el => {
    el.addEventListener("change", updateDates);
});

</script>

</body>
</html>
